<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل النصوص والكلمات</title>
    <style>
        :root { --primary: #0056b3; --white: #fff; --gray: #e9ecef; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: #f4f7f6; }
        .tool-box { background: var(--white); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; max-width: 650px; margin: 0 auto; }
        .tool-box h2 { color: var(--primary); border-bottom: 2px solid var(--gray); padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        textarea { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; resize: vertical; font-family: inherit; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; text-align: center; }
        .stat-card { background: var(--gray); padding: 10px; border-radius: 4px; font-weight: bold; }
        .stat-card span { display: block; color: var(--primary); font-size: 1.4rem; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-group button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: #6c757d; color: #fff; }
        .btn-group button.primary { background: var(--primary); }
    </style>
</head>
<body>
    <div class="tool-box">
        <h2>محلل النصوص والعداد المتقدم</h2>
        <textarea id="textInput" rows="8" placeholder="اكتب أو الصق نصك هنا للتحليل الفوري..." oninput="analyzeText()"></textarea>
        
        <div class="stats-grid">
            <div class="stat-card">الكلمات<span id="wordCount">0</span></div>
            <div class="stat-card">الحروف<span id="charCount">0</span></div>
            <div class="stat-card">الأسطر<span id="lineCount">0</span></div>
            <div class="stat-card">وقت القراءة<span id="readTime">0 د</span></div>
        </div>

        <div class="btn-group">
            <button class="primary" onclick="copyText()">نسخ النص</button>
            <button onclick="modifyText('up')">أحرف كبيرة (EN)</button>
            <button onclick="modifyText('low')">أحرف صغيرة (EN)</button>
            <button style="background:#dc3545;" onclick="clearText()">مسح الكل</button>
        </div>
    </div>

    <script>
        const txt = document.getElementById('textInput');
        function analyzeText() {
            const val = txt.value;
            const words = val.trim().split(/\s+/).filter(w => w.length > 0);
            
            document.getElementById('wordCount').innerText = words.length;
            document.getElementById('charCount').innerText = val.length;
            document.getElementById('lineCount').innerText = val.split('\n').filter(l => l.length > 0).length;
            document.getElementById('readTime').innerText = Math.ceil(words.length / 200) + " د";
        }
        function copyText() { navigator.clipboard.writeText(txt.value); alert("تم النسخ للحافظة!"); }
        function clearText() { txt.value = ''; analyzeText(); }
        function modifyText(mode) {
            txt.value = (mode === 'up') ? txt.value.toUpperCase() : txt.value.toLowerCase();
            analyzeText();
        }
    </script>
</body>
</html>
