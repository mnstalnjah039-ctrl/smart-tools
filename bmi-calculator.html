<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة كتلة الجسم BMI</title>
    <style>
        :root { --primary: #0056b3; --white: #fff; --gray: #e9ecef; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: #f4f7f6; }
        .tool-box { background: var(--white); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; max-width: 400px; margin: 0 auto; text-align: center; }
        .tool-box h2 { color: var(--primary); border-bottom: 2px solid var(--gray); padding-bottom: 10px; margin-bottom: 20px; }
        label { display: block; text-align: right; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; font-family: inherit; }
        button { background: var(--primary); color: var(--white); border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 1.1rem; width: 100%; font-weight: bold; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; font-weight: bold; display: none; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="tool-box">
        <h2>حاسبة مؤشر كتلة الجسم (BMI)</h2>
        <label>الوزن (بالكيلوجرام):</label>
        <input type="number" id="weight" placeholder="مثال: 75">
        
        <label>الطول (بالسنتيمتر):</label>
        <input type="number" id="height" placeholder="مثال: 175">

        <button onclick="calculateBMI()">احسب الآن</button>
        <div id="bmiResult" class="result"></div>
    </div>

    <script>
        function calculateBMI() {
            const w = parseFloat(document.getElementById('weight').value);
            const h = parseFloat(document.getElementById('height').value) / 100; // تحويل لمتر
            const res = document.getElementById('bmiResult');

            if (!w || !h) return alert("الرجاء إدخال الوزن والطول بشكل صحيح.");

            const bmi = (w / (h * h)).toFixed(1);
            res.style.display = "block";
            
            let status = "";
            let color = "";

            if (bmi < 18.5) { status = "نحافة مفرطة"; color = "#17a2b8"; }
            else if (bmi < 25) { status = "وزن مثالي وصحي ورائع!"; color = "#28a745"; }
            else if (bmi < 30) { status = "زيادة في الوزن (وزن زائد)"; color = "#ffc107"; }
            else { status = "سمنة مفرطة، ينصح بمراجعة حميتك الغذائية"; color = "#dc3545"; }

            res.style.backgroundColor = color;
            res.style.color = (color === "#ffc107") ? "#333" : "#white";
            res.innerHTML = `مؤشر كتلة جسمك هو: ${bmi}<br><small>${status}</small>`;
        }
    </script>
</body>
</html>
