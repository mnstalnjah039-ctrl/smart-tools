<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع رموز QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #0056b3; --white: #fff; --gray: #e9ecef; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: #f4f7f6; }
        .tool-box { background: var(--white); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; max-width: 450px; margin: 0 auto; text-align: center; }
        .tool-box h2 { color: var(--primary); border-bottom: 2px solid var(--gray); padding-bottom: 10px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; font-family: inherit; }
        button { background: var(--primary); color: var(--white); border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 1.1rem; width: 100%; font-weight: bold; transition: background 0.3s; margin-top: 10px; }
        button:hover { background: #004494; }
        #qrcode { margin: 20px auto; padding: 10px; background: #fff; display: inline-block; border: 1px solid #ddd; border-radius: 4px; }
        #downloadBtn { background: #28a745; display: none; }
        #downloadBtn:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="tool-box">
        <h2>صانع رموز QR الذكي</h2>
        <input type="text" id="qrText" placeholder="أدخل الرابط أو النص هنا...">
        
        <select id="qrSize">
            <option value="150">حجم صغير (150x150)</option>
            <option value="250" selected>حجم متوسط (250x250)</option>
            <option value="400">حجم كبير (400x400)</option>
        </select>

        <button onclick="generateQR()">توليد رمز QR</button>
        
        <div id="qrcode"></div>
        <button id="downloadBtn" onclick="downloadQR()">تحميل الرمز بصيغة PNG</button>
    </div>

    <script>
        let qrcodeContainer = document.getElementById("qrcode");
        let dlBtn = document.getElementById("downloadBtn");
        let qr;

        function generateQR() {
            const text = document.getElementById("qrText").value.trim();
            const size = document.getElementById("qrSize").value;
            
            if (!text) return alert("الرجاء إدخال نص أو رابط أولاً.");
            
            qrcodeContainer.innerHTML = ""; // تنظيف القديم
            
            qr = new QRCode(qrcodeContainer, {
                text: text,
                width: parseInt(size),
                height: parseInt(size),
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // إظهار زر التحميل بعد ثوانٍ بسيطة من التوليد
            setTimeout(() => {
                dlBtn.style.display = "block";
            }, 300);
        }

        function downloadQR() {
            const img = qrcodeContainer.querySelector("img");
            if (!img) return;
            const a = document.createElement("a");
            a.href = img.src;
            a.download = "qrcode.png";
            a.click();
        }
    </script>
</body>
</html>
